# Cloudflare Workers config for GetStampd production.
#
# DO NOT `wrangler deploy` from a local machine without coordination.
# This file is checked in so CI / the production deploy step can use it.
#
# Zone: getstampd.com.au (registrar: Crazy Domains, DNS: Cloudflare)
# Build output is produced by `bun run build` (nitro cloudflare-module via
# @lovable.dev/vite-tanstack-config with `nitro: true` in vite.config.ts).
#
# IMPORTANT — nitro auto-generates its own Worker config at
#   dist/server/wrangler.json
# and writes `.wrangler/deploy/config.json` pointing wrangler at it. When
# `wrangler deploy` runs from the repo root, it uses the nitro-generated
# config, NOT this file. `main` / `[assets]` here are effectively overridden
# (nitro emits a WARN to that effect during build). This file is kept for:
#   1. documenting intent (project name, compat flags, routes plan), and
#   2. providing a fallback if anyone explicitly runs `wrangler deploy
#      --config wrangler.toml`.
# Keep the values below in sync with what nitro emits.

name = "region-beacon"
# Worker entry emitted by nitro. The `tanstackStart.server.entry: "server"`
# setting redirects the SSR entry to src/server.ts, but nitro still names the
# emitted bundle `index.mjs`.
main = "dist/server/index.mjs"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
# account_id = "<fill-in-before-first-deploy>"

# First deploy: workers.dev only, no zone routes. Safe to deploy without
# affecting any live getstampd.com.au hostname.
workers_dev = true

# Static assets emitted by nitro alongside the Worker bundle.
[assets]
directory = "dist/client"
binding = "ASSETS"

[vars]
NODE_ENV = "production"
# VITE_SUPABASE_URL / VITE_SUPABASE_PUBLISHABLE_KEY are baked in at BUILD time
# (Vite replaces import.meta.env.* at build). Set them in the CI/build env,
# not here. Runtime-only secrets (service role, webhook secrets) go in
# `wrangler secret put NAME` once they exist.

# --- Observability ---
# Enabled so we can diagnose the workers.dev runtime error from the
# Cloudflare Dashboard → Worker → Observability / Logs.
# NOTE: Nitro's generated dist/server/wrangler.json overrides this file at
# deploy time. The post-build script `scripts/patch-wrangler-observability.mjs`
# (wired into `bun run build`) injects the same observability block into the
# generated JSON so these settings actually take effect. Keep the two in sync.
# `traces` and `persist` are not valid wrangler observability fields and are
# intentionally omitted; Workers Logs persistence is controlled in the Dashboard.
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

# Production zone routes — wildcard SaaS routing.
# Workers Custom Domains do NOT support wildcards; we use Worker Routes
# attached to the zone. Each matching hostname needs a proxied (orange-cloud)
# DNS record on the zone for the route to fire.
#
# SAFETY: ALL zone routes are commented out for the FIRST test deploy.
# First deploy goes to `workers.dev` only and is smoke-tested in isolation,
# with zero impact on the live getstampd.com.au hostnames.
#
# Phase A (intentional production cutover): uncomment apex + www + app blocks,
#   redeploy, then add the proxied DNS records for @, www, app on Cloudflare.
# Phase B (tenant routing): uncomment the *.getstampd.com.au block AND add
#   the wildcard DNS record together.

# workers_dev = true is the default when no zone routes are active, which is
# what we want for the first test deploy. The Worker will be reachable at
# https://getstampd-prod.<account>.workers.dev — production hostnames are
# untouched.

# --- Phase A (LIVE) ---
[[routes]]
pattern = "getstampd.com.au/*"
zone_name = "getstampd.com.au"
custom_domain = false

[[routes]]
pattern = "www.getstampd.com.au/*"
zone_name = "getstampd.com.au"
custom_domain = false

[[routes]]
pattern = "app.getstampd.com.au/*"
zone_name = "getstampd.com.au"
custom_domain = false

# --- Phase B (LIVE) — wildcard tenant routing ---
# Paired with proxied CNAME `* → getstampd.com.au` in the zone.
# Cloudflare prefers more specific routes, so the Phase A apex/www/app
# blocks above still match their hostnames first.
[[routes]]
pattern = "*.getstampd.com.au/*"
zone_name = "getstampd.com.au"
custom_domain = false

# custom_domain = false
