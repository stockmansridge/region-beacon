name: Deploy GetStampd Cloudflare Worker

# One-click production deploy for getstampd.com.au.
#
# Trigger:        Actions tab → "Deploy GetStampd Cloudflare Worker" → Run workflow
# Deploys to:     Cloudflare Worker `region-beacon` (see wrangler.toml)
# Serves:         https://getstampd.com.au (apex, www, app, *.getstampd.com.au)
# Required repo secrets:
#   - CLOUDFLARE_API_TOKEN   Token with "Edit Cloudflare Workers" template
#                            scoped to the account that owns the zone.
#   - CLOUDFLARE_ACCOUNT_ID  Account ID shown in any Cloudflare dashboard
#                            right-sidebar.
# Optional repo secrets (build-time Supabase wiring — without these the
# Vite build will throw because VITE_DEPLOY_TARGET=cloudflare requires them):
#   - VITE_SUPABASE_URL              e.g. https://kyjwifumacnrpgyextzz.supabase.co
#   - VITE_SUPABASE_PUBLISHABLE_KEY  the anon JWT

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional note shown in the run summary (e.g. release tag)"
        required: false
        default: ""

concurrency:
  group: deploy-cloudflare-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy region-beacon
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      VITE_DEPLOY_TARGET: cloudflare
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (best-effort)
        run: |
          if [ -f tsconfig.json ]; then
            bunx tsc --noEmit || echo "::warning::typecheck reported issues (not blocking deploy)"
          fi

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare (wrangler)
        run: bunx wrangler deploy

      - name: Post-deploy health check
        id: healthcheck
        run: |
          set +e
          echo "Waiting 5s for Cloudflare edge propagation..."
          sleep 5
          BODY=$(curl -sS --max-time 15 https://getstampd.com.au/debug/worker-health)
          STATUS=$?
          echo "curl exit: $STATUS"
          echo "$BODY"
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summary
        run: |
          {
            echo "## GetStampd Cloudflare Worker — deploy complete"
            echo ""
            echo "- Worker name:   **region-beacon**"
            echo "- Branch:        \`${GITHUB_REF_NAME}\`"
            echo "- Commit:        \`${GITHUB_SHA}\`"
            echo "- Triggered by:  ${GITHUB_ACTOR}"
            echo "- Timestamp:     $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Reason:        ${{ github.event.inputs.reason }}"
            echo "- Production:    https://getstampd.com.au"
            echo ""
            echo "### /debug/worker-health"
            echo '```json'
            echo "${{ steps.healthcheck.outputs.body }}"
            echo '```'
            echo ""
            echo "Verify in browser: https://getstampd.com.au/admin — the amber"
            echo "BUILD_MARKER bar should match the direct Lovable preview."
          } >> "$GITHUB_STEP_SUMMARY"
